components:
  schemas:
    AgeRestrictionEnum:
      enum:
      - none
      - 18+
      - 21+
      type: string
      description: |-
        * `none` - No Restriction
        * `18+` - 18+
        * `21+` - 21+
    Amenity:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
        description:
          type: string
        icon:
          type: string
          format: uri
          nullable: true
        created_at:
          type: string
          format: date-time
