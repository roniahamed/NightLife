version: '3.8'

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8080:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=nightlife_db
      - POSTGRES_USER=nightlife_user
      - POSTGRES_PASSWORD=nightlife_pass

  redis:
    image: redis:7-alpine

volumes:
  postgres_data:
